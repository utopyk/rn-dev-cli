<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Metro Logs \u2014 metro-logs</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e5e7eb;
        font-size: 13px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 15px;
        font-weight: 600;
      }
      .bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .bar-right {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        background: #1f2937;
        color: #e5e7eb;
        border: 1px solid #374151;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { background: #374151; }
      button:disabled { opacity: 0.5; cursor: default; }
      label.toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        color: #9ca3af;
      }
      input[type="text"] {
        background: #0b0d11;
        color: #e5e7eb;
        border: 1px solid #374151;
        padding: 5px 8px;
        border-radius: 4px;
        font-size: 12px;
        min-width: 200px;
      }
      input[type="text"]:focus { border-color: #60a5fa; outline: none; }
      select {
        background: #0b0d11;
        color: #e5e7eb;
        border: 1px solid #374151;
        padding: 5px 8px;
        border-radius: 4px;
        font-size: 12px;
      }
      .status {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 10px;
        padding: 8px 12px;
        background: #1a1d23;
        border: 1px solid #2a2f38;
        border-radius: 4px;
      }
      .status-label { color: #6b7280; }
      .status-value { color: #e5e7eb; margin-right: 12px; }
      .status-value--ok { color: #34d399; }
      .status-value--warn { color: #fb923c; }
      .status-value--muted { color: #6b7280; }
      .log-list {
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        background: #0b0d11;
        border: 1px solid #1f2937;
        border-radius: 4px;
        padding: 8px;
        max-height: calc(100vh - 200px);
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-row {
        padding: 2px 4px;
      }
      .log-row .seq {
        color: #4b5563;
        margin-right: 8px;
        user-select: none;
      }
      .log-row.stderr { color: #f87171; }
      .log-row.stdout { color: #e5e7eb; }
      .empty {
        padding: 24px;
        text-align: center;
        color: #9ca3af;
        border: 1px dashed #374151;
        border-radius: 6px;
      }
      .error {
        padding: 10px 12px;
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.25);
        color: #f87171;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1>Metro Logs</h1>
      <div class="bar-right">
        <input id="filter" type="text" placeholder="Filter substring\u2026" />
        <select id="stream">
          <option value="">All streams</option>
          <option value="stdout">stdout</option>
          <option value="stderr">stderr</option>
        </select>
        <label class="toggle">
          <input id="follow" type="checkbox" checked />
          Follow
        </label>
        <button id="clear">Clear</button>
        <button id="refresh">Refresh</button>
      </div>
    </div>
    <div id="status" class="status" hidden></div>
    <div id="content">
      <div class="empty">Loading\u2026</div>
    </div>
    <script src="./panel.js"></script>
  </body>
</html>
