<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Network \u2014 devtools-network</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1115;
        color: #e5e7eb;
        font-size: 13px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 15px;
        font-weight: 600;
      }
      .bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .bar-right {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        background: #1f2937;
        color: #e5e7eb;
        border: 1px solid #374151;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { background: #374151; }
      button:disabled { opacity: 0.5; cursor: default; }
      .status {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 10px;
        padding: 8px 12px;
        background: #1a1d23;
        border: 1px solid #2a2f38;
        border-radius: 4px;
      }
      .status-label { color: #6b7280; }
      .status-value { color: #e5e7eb; margin-right: 12px; }
      .status-value--ok { color: #34d399; }
      .status-value--warn { color: #fb923c; }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      th, td {
        text-align: left;
        padding: 6px 8px;
        border-bottom: 1px solid #1f2937;
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
      th {
        font-family: inherit;
        color: #9ca3af;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        font-size: 10px;
        border-bottom: 1px solid #374151;
      }
      .col-method { width: 64px; }
      .col-status { width: 64px; }
      .col-dur { width: 80px; text-align: right; }
      .col-url { word-break: break-all; }
      .dur { text-align: right; }
      .status-pending { color: #9ca3af; }
      .status-ok { color: #e5e7eb; }
      .status-redir { color: #60a5fa; }
      .status-4xx { color: #fb923c; }
      .status-5xx { color: #f87171; }
      .status-err { color: #f87171; font-weight: 600; }
      .empty {
        padding: 24px;
        text-align: center;
        color: #9ca3af;
        border: 1px dashed #374151;
        border-radius: 6px;
      }
      .error {
        padding: 10px 12px;
        background: rgba(248, 113, 113, 0.08);
        border: 1px solid rgba(248, 113, 113, 0.25);
        color: #f87171;
        border-radius: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <h1>Network</h1>
      <div class="bar-right">
        <button id="clear">Clear</button>
        <button id="refresh">Refresh</button>
      </div>
    </div>
    <div id="status" class="status" hidden></div>
    <div id="content">
      <div class="empty">Loading\u2026</div>
    </div>
    <script src="./panel.js"></script>
  </body>
</html>
